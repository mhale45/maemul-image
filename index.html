<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백억지도 매물 뷰어</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a; /* Sleek dark blue */
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8; /* Sky blue accent */
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            font-size: 1.1rem;
            color: var(--text-secondary);
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            transition: transform 0.3s ease;
        }

        .main-card:hover {
            transform: scale(1.01);
        }

        .image-container {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 16px;
            overflow: hidden;
            background: #1e293b;
            position: relative;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: opacity 0.5s ease;
        }

        .info-section {
            margin-top: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-section .detail {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-section .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
        }

        .info-section .value {
            font-size: 0.9rem;
            font-weight: 600;
        }

        .refresh-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .refresh-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }

        /* Mobile adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .info-section { flex-direction: column; align-items: flex-start; gap: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>BAI KUK VIEW</h1>
            <p class="subtitle">실시간 매물 이미지 자동 추출 서비스</p>
        </header>

        <div class="main-card">
            <div class="image-container">
                <!-- SCAPER_IMAGE_URL Placeholder -->
                <img id="main-image" src="https://baikuk.com/gallery/view/528888" alt="매물 이미지">
            </div>

            <div class="info-section">
                <div class="detail">
                    <span class="label">대상 매물</span>
                    <span class="value">금릉동 쇠재마을 배후세대多</span>
                </div>
                <div class="detail">
                    <span class="label">동기화 시간</span>
                    <span class="value">2026-03-31 07:56:19</span>
                </div>
                <div class="actions">
                    <a href="https://baikuk.com/item/view/27852" target="_blank" class="refresh-button">
                        원문 방문하기 ↗
                    </a>
                </div>
            </div>
        </div>

        <footer>
            <p>© 2026 BAIKUK MAP Automator. Built with Python & GitHub Actions.</p>
            <p>데이터 출처: <a href="https://baikuk.com" target="_blank">baikuk.com</a></p>
        </footer>
    </div>

</body>
</html>
