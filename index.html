<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI KUK VIEW</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-primary: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* Image List Styles */
        .image-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .image-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .image-item:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .image-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .image-item {
                border-radius: 12px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>BAI KUK VIEW</h1>
        </header>

        <div class="image-list">
            <div class="image-item"><img src="https://baikuk.com/gallery/view/528888" alt="매물 이미지" loading="lazy"></div>
            <div class="image-item"><img src="https://baikuk.com/gallery/view/528889" alt="매물 이미지" loading="lazy"></div>
            <div class="image-item"><img src="https://baikuk.com/gallery/view/528890" alt="매물 이미지" loading="lazy"></div>
        </div>
    </div>
</body>

</html>
