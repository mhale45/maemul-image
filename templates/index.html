<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI KUK VIEW</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-primary: #f8fafc;
            --text-secondary: rgba(255, 255, 255, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-form {
            display: flex;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .search-form:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 25px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #0ea5e9;
        }

        /* Status & Action Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .status-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-weight: 600;
        }

        /* Image List Styles */
        .image-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        .image-item {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .image-item:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .image-item img {
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        /* Full Screen Mode for images only */
        body.viewer-mode {
            padding: 10px;
            background: #000;
        }

        body.viewer-mode .container {
            max-width: 1000px;
        }

        @media (max-width: 600px) {
            body {
                padding: 10px;
            }

            .image-item {
                border-radius: 12px;
            }
        }
    </style>
</head>

<body {% if images %}class="viewer-mode" {% endif %}>
    <div class="container">

        {% if not images %}
        <div class="search-container">
            <form action="/" method="GET" class="search-form">
                <input type="text" name="id" class="search-input" placeholder="매물 번호를 입력하세요 (예: 528888)"
                    value="{{ item_id }}">
                <button type="submit" class="search-btn">검색</button>
            </form>
        </div>
        {% endif %}

        {% if images %}

        <div class="image-list">
            {% for img in images %}
            <div class="image-item">
                <img src="{{ img }}" alt="매물 {{ item_id }} 이미지 {{ loop.index }}" loading="lazy">
            </div>
            {% endfor %}
        </div>
        {% elif item_id %}
        <!-- 검색 결과 없음 -->
        <div class="empty-state">
            <p>⚠️ 매물 번호 <strong>{{ item_id }}</strong>에 해당하는 요소를 찾지 못했거나 이미지가 없습니다.</p>
            <div style="margin-top: 20px;">
                <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 600;">메인으로 돌아가기</a>
            </div>
        </div>
        {% else %}
        <!-- 검색 전 기본 화면 -->
        <div class="empty-state">
            <p>매물 번호를 입력하여 이미지를 확인해보세요.</p>
        </div>
        {% endif %}

        <footer>
            <p>&copy; 2026 BAI KUK VIEW. All rights reserved.</p>
        </footer>
    </div>
</body>

</html>
