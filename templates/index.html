<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAI KUK VIEW</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Outfit:wght@300;600;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --text-primary: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(56, 189, 248, 0.1) 0px, transparent 50%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            text-align: center;
        }

        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            text-align: center;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* Search Bar */
        .search-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-form {
            display: flex;
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            overflow: hidden;
            backdrop-filter: blur(5px);
            transition: all 0.3s ease;
        }

        .search-form:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.3);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 15px 20px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .search-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 0 25px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .search-btn:hover {
            background: #0ea5e9;
        }

        /* Status & Action Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .status-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 5px 12px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            font-weight: 600;
        }

        .original-link {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.2s;
        }

        .original-link:hover {
            color: var(--text-primary);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px dashed rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
        }

        /* Slider Styles */
        .slider-wrapper {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .slider-container {
            display: flex;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            width: 100%;
        }

        .slide {
            min-width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        .slide img {
            width: 100%;
            max-height: 80vh;
            object-fit: contain;
            display: block;
        }

        /* Navigation Buttons */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            cursor: pointer;
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.8rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 10;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            -webkit-tap-highlight-color: transparent;
        }

        .nav-btn:hover {
            background: var(--accent);
            transform: translateY(-50%) scale(1.1);
            border-color: #fff;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.6);
        }

        .nav-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        .prev-btn {
            left: 35px;
        }

        .next-btn {
            right: 35px;
        }

        /* Counter/Dots */
        .slider-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            backdrop-filter: blur(5px);
        }

        footer {
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        /* Full Screen Mode & Mobile Optimization */
        body.full-screen-mode {
            padding: 0 !important;
            margin: 0 !important;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        body.full-screen-mode .container {
            max-width: 100% !important;
            width: 100% !important;
            height: 100vh;
            gap: 0;
            padding: 0;
        }

        body.full-screen-mode .slider-wrapper {
            border-radius: 0;
            border: none;
            box-shadow: none;
            height: 100vh;
            background: #000;
        }

        body.full-screen-mode .slider-container,
        body.full-screen-mode .slide {
            height: 100vh;
        }

        body.full-screen-mode .slide img {
            max-height: 100vh;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Mobile-Friendly Navigation */
        body.full-screen-mode .nav-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        @media (max-width: 600px) {
            body.full-screen-mode .nav-btn,
            .nav-btn {
                width: 60px;
                height: 60px;
                font-size: 2.2rem;
                background: rgba(0, 0, 0, 0.4);
            }
            .prev-btn { left: 20px; }
            .next-btn { right: 20px; }
        }

        body.full-screen-mode .slider-info {
            bottom: 25px;
            font-weight: 600;
        }
    </style>
</head>

<body {% if images %}class="full-screen-mode"{% endif %}>
    <div class="container">
        {% if not images %}
        <header>
            <h1>BAI KUK VIEW</h1>
        </header>
        {% endif %}

        {% if images %}
        <div class="slider-wrapper">
            <div class="slider-container" id="slider">
                {% for img in images %}
                <div class="slide"><img src="{{ img }}" alt="매물 {{ item_id }} 이미지 {{ loop.index }}"></div>
                {% endfor %}
            </div>

            <button class="nav-btn prev-btn" id="prev">‹</button>
            <button class="nav-btn next-btn" id="next">›</button>

            <div class="slider-info" id="counter">1 / {{ images|length }}</div>
        </div>
        {% elif item_id %}
        <!-- 검색 결과 없음 -->
        <div class="empty-state">
            <p>⚠️ 매물 번호 <strong>{{ item_id }}</strong>에 해당하는 요소를 찾지 못했거나 이미지가 없습니다.</p>
        </div>
        {% else %}
        <!-- 검색 전 기본 화면 -->
        <div class="empty-state">
            <p>매물 번호를 입력하여 이미지를 확인해보세요.</p>
        </div>
        {% endif %}
    </div>

    {% if images %}
    <script>
        const slider = document.getElementById('slider');
        const slides = slider.children;
        const total = slides.length;
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const counter = document.getElementById('counter');

        let currentIdx = 0;

        function updateSlider() {
            slider.style.transform = `translateX(-${currentIdx * 100}%)`;
            counter.innerText = `${currentIdx + 1} / ${total}`;
        }

        nextBtn.addEventListener('click', () => {
            currentIdx = (currentIdx + 1) % total;
            updateSlider();
        });

        prevBtn.addEventListener('click', () => {
            currentIdx = (currentIdx - 1 + total) % total;
            updateSlider();
        });

        // Initialize
        if (total <= 1) {
            prevBtn.style.display = 'none';
            nextBtn.style.display = 'none';
            counter.style.display = 'none';
        }
        updateSlider();
    </script>
    {% endif %}
</body>

</html>
